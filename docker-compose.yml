version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: cliniqai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ml_models_data:/app/ml_models
    networks:
      - cliniqai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cliniqai_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - cliniqai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  cliniqai_network:
    driver: bridge

volumes:
  ml_models_data:
